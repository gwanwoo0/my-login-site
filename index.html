<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>로그인 페이지</title>
        <style>
            h1 {color: yellow; background-color: gray; padding: 10px;}

            .p_back {text-align: center; margin-top: 30px; background-color: red; color: white; padding: 15px;}

            .login-container {margin-top: 30px; padding: 20px; border: 1px solid white; width: fit-content;}

            .input-group {margin-bottom: 15px; display: flex; align-items: center; position: relative;}

            .input-group label {width: 80px; font-weight: bold; cursor: help;}

            .input-group input {padding: 8px; border: 1px solid gray; border-radius: 4px;}

            .tooltip-text {visibility: hidden; background-color: black; color: white; text-align: center; padding: 8px 12px; border-radius: 6px; position: absolute; z-index: 10; left: 0; top: -40px; white-space: nowrap; font-size: 13px; box-shadow: 0px 2px 5px rgba(0,0,0,0.2);}

            .input-group label:hover + .tooltip-text {visibility: visible;}

            .p_back2 {font-size: 20px; font-weight: bold; color: blue; margin-top: 20px;}
        </style>
    </head>
    <body>
        <h1> 로그인 </h1>

        <div class="p_back">
            로그인하려면 아이디와 패스워드를 입력하세요.<br>
            <b><a href="https://www.syu.ac.kr" target="_blank" style="color: blue;">삼육대학교</a></b>
        </div>

        <div class="login-container">
            <div class="input-group">
                <label>아이디</label>
                <span class="tooltip-text">아이디는 학번을 입력해주세요.</span>
                <input type="text" placeholder="학번 입력">
            </div>

            <div class="input-group">
                <label>패스워드</label>
                <span class="tooltip-text">패스워드는 대문자, 소문자, 특수문자, 숫자를 조합해야 합니다.</span>
                <input type="password" placeholder="비밀번호 입력">
            </div>

            <button type="button" style="padding: 5px 15px; cursor: pointer;">로그인</button>
        </div>

        <p class="p_back2">&amp; 엠퍼센트 ; 세미콜론</p>
    </body>
    </html>
